{% extends 'biblioteca/layout.html' %}

{% block content %}
    <h3>Apagar Formação</h3>
    
    <form action="" method="post" enctype='multipart/form-data'>
    <!-- enctype deve ser definido se houver submissão de ficheiros ou imagens -->

      {% csrf_token %}   <!-- obrigatório nos forms Django -->
      <table>
          {{ form }}   <!-- insere input para cada atributo da classe Formação, numa tabela -->
      </table>
      <input type="submit" value="Apagar formação"> 

    </form>      

{% endblock %}
